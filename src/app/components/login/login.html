<div class="login-container">
  <div class="login-card">
    <div class="logo">
      <h1>🥩 CHULETONES</h1>
      
    </div>
    
    <div class="tab-buttons">
      <button 
        [class.active]="activeTab === 'login'" 
        (click)="activeTab = 'login'">
        Acceder
      </button>
      <button 
        [class.active]="activeTab === 'register'" 
        (click)="activeTab = 'register'">
        Registrarse
      </button>
    </div>

    <!-- Login Form -->
    <form *ngIf="activeTab === 'login'" [formGroup]="loginForm" (ngSubmit)="onLogin()">
      <div class="input-group">
        <input type="email" formControlName="email" placeholder="Email">
        <label>Email</label>
      </div>
      
      <div class="input-group">
        <input type="password" formControlName="password" placeholder="Contraseña">
        <label>Contraseña</label>
      </div>
      
      <button type="submit" [disabled]="loginForm.invalid">
        Entrar
      </button>
      
      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>
    </form>

    <!-- Register Form -->
    <form *ngIf="activeTab === 'register'" [formGroup]="registerForm" (ngSubmit)="onRegister()">
      <div class="input-group">
        <input type="email" formControlName="email" placeholder="Email">
        <label>Email</label>
      </div>
      
      <div class="input-group">
        <input type="password" formControlName="password" placeholder="Contraseña">
        <label>Contraseña</label>
      </div>

      <div class="input-group">
        <input type="password" formControlName="confirmPassword" placeholder="Confirmar contraseña">
        <label>Confirmar contraseña</label>
      </div>
      
      <button type="submit" [disabled]="registerForm.invalid">
        Crear cuenta
      </button>
      
      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>
    </form>
  </div>
</div>
